# Reverse-proxy для приложения «Мои финансы».
# Положить в /etc/nginx/sites-available/finance и слинковать в sites-enabled.
# ЗАМЕНИТЕ money.example.com на ваш поддомен.
#
# Блок ниже — только для HTTP (порт 80). HTTPS-блок добавит certbot автоматически
# командой:  sudo certbot --nginx -d money.example.com

server {
    listen 80;
    listen [::]:80;
    server_name money.example.com;

    # тело запроса — данные небольшие, но с запасом
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
